name: "amplifier-ecosystem-audit"
description: "Audit all Amplifier ecosystem repositories (public and private) in the Microsoft GitHub organization for compliance. Uses a batched architecture (configurable batch_size, default 25) with public/private separation; scales past 100 repos and supports the audit_visibility filter."
version: "2.0.0"
author: "Amplifier Team"
tags: ["audit", "compliance", "github", "amplifier", "ecosystem", "multi-repo"]

# Amplifier Ecosystem Audit Recipe
#
# Discovers all repositories starting with "amplifier" in the Microsoft
# GitHub organization (both public and private) and audits each for
# compliance with:
# - Listed in MODULES.md for discoverability (public repos only)
# - Required Microsoft boilerplate files
# - README.md Contributing and Trademarks sections
# - GitHub Issues status
# - Repository activity stats
#
# The audit report groups results by visibility (public vs private),
# giving a full picture of the ecosystem while allowing different
# policies per visibility level.
#
# Usage:
#   # Full ecosystem audit (discovery + audit all repos)
#   amplifier recipes execute amplifier-ecosystem-audit.yaml
#
#   # With fix PR creation enabled
#   amplifier recipes execute amplifier-ecosystem-audit.yaml --context '{"create_fix_prs": "true"}'
#
#   # Audit specific repos only (skip discovery)
#   amplifier recipes execute amplifier-ecosystem-audit.yaml --context '{
#     "repos": ["amplifier-core", "amplifier-foundation", "amplifier-app-cli"]
#   }'
#
#   # Include community repos (non-Microsoft)
#   amplifier recipes execute amplifier-ecosystem-audit.yaml --context '{
#     "include_community": "true"
#   }'
#
#   # Override max repos safety limit (default: 100)
#   amplifier recipes execute amplifier-ecosystem-audit.yaml --context '{
#     "max_repos": 200
#   }'
#
# Requirements:
#   - gh CLI installed and authenticated
#   - repo-audit.yaml recipe (in same directory)
#   - Write access to repos if create_fix_prs is "true"

recursion:
  max_depth: 5
  max_total_steps: 1000

rate_limiting:
  max_concurrent_llm: 3
  min_delay_ms: 500

context:
  # Option 1: Discover repos automatically (default)
  # Leave repos empty to auto-discover all amplifier* repos
  # Format when specified: ["amplifier-core", "amplifier-foundation", ...]
  repos: []
  
  # Include community (non-Microsoft) repos from MODULES.md
  # Use string "true"/"false" for condition compatibility
  include_community: "false"
  
  # Default empty community repos (populated if include_community is true)
  community_repos: {"source": "none", "repos": []}
  
  # Whether to create PRs for fixable issues
  create_fix_prs: "false"
  
  # Dry-run mode: show what WOULD happen without actually creating PRs
  # Passes through to individual repo audits
  dry_run: "false"
  
  # Maximum repos to audit (safety limit - stops with error if exceeded)
  # Override via --context '{"max_repos": 2000}' if ecosystem grows further.
  # Default raised in v2.0.0 — batched architecture scales safely past 100.
  max_repos: 1000

  # Batch size for the audit-batches foreach. Each batch is processed
  # by ecosystem-audit-batch.yaml. Default 25 keeps per-batch wall time
  # under ~25 minutes at parallel: 2.
  batch_size: 25

  # Visibility filter for batched runs:
  #   "all"     — audit both public and private (default)
  #   "public"  — public repos only; private batches skipped at split time
  #   "private" — private repos only; public batches skipped at split time
  audit_visibility: "all"

  # Working directory for intermediate files
  working_dir: "./ai_working/ecosystem-audit"
  
  # Report output filename
  report_filename: "ecosystem-audit-report.md"

stages:
  # ==========================================================================
  # STAGE 1: Discovery and Planning
  # ==========================================================================
  - name: "discovery"
    steps:
      - id: "setup-working-dir"
        type: "bash"
        command: |
          set -euo pipefail
          mkdir -p "{{working_dir}}/repos"
          mkdir -p "{{working_dir}}/reports"
          date -Iseconds > "{{working_dir}}/audit-started.txt"
          echo "Working directory created: {{working_dir}}"
        output: "setup_result"
        timeout: 30

      - id: "discover-repos"
        type: "bash"
        parse_json: true
        command: |
          set -euo pipefail
          
          # Check if repos were provided manually
          MANUAL_REPOS='{{repos}}'
          
          if [ "$MANUAL_REPOS" != "[]" ] && [ -n "$MANUAL_REPOS" ] && [ "$MANUAL_REPOS" != "null" ]; then
            # Use manually provided repos
            echo "$MANUAL_REPOS" | jq '{
              source: "manual",
              repos: [.[] | {owner: "microsoft", name: ., url: ("https://github.com/microsoft/" + .), visibility: "unknown"}]
            }'
          else
            # Discover repos using REST API with pagination
            # This queries the org directly — no search index, no indexing delay
            echo "Discovering amplifier* repos in Microsoft org via REST API (paginated)..." >&2
            
            REPOS_JSON=$(gh api --paginate "orgs/microsoft/repos?type=all&per_page=100" \
              --jq '[.[] | select(.name | test("^amplifier"; "i")) | select(.archived == false) | {
                owner: "microsoft",
                name: .name,
                url: .html_url,
                description: (.description // ""),
                visibility: .visibility
              }]' 2>/dev/null | jq -s 'add // []')
            
            if [ -n "$REPOS_JSON" ] && echo "$REPOS_JSON" | jq -e 'length > 0' > /dev/null 2>&1; then
              REPO_COUNT=$(echo "$REPOS_JSON" | jq 'length')
              PUBLIC_COUNT=$(echo "$REPOS_JSON" | jq '[.[] | select(.visibility == "public")] | length')
              PRIVATE_COUNT=$(echo "$REPOS_JSON" | jq '[.[] | select(.visibility != "public")] | length')
              echo "Found $REPO_COUNT repos ($PUBLIC_COUNT public, $PRIVATE_COUNT private)" >&2
              
              echo "$REPOS_JSON" | jq '{source: "rest_api_paginated", repos: .}'
            else
              # Fallback: Search API (may miss recently created repos)
              echo "REST API pagination failed, falling back to Search API..." >&2
              echo "WARNING: Search API may miss recently created repos due to indexing delay" >&2
              
              SEARCH_RESULTS=$(gh api "search/repositories?q=amplifier+in:name+org:microsoft&per_page=100" 2>&1)
              
              if echo "$SEARCH_RESULTS" | jq -e '.items' > /dev/null 2>&1; then
                echo "$SEARCH_RESULTS" | jq '{
                  source: "search_api_fallback",
                  repos: [.items[] | select(.archived == false) | {
                    owner: "microsoft",
                    name: .name,
                    url: .html_url,
                    description: (.description // ""),
                    visibility: .visibility
                  }]
                }'
              else
                echo "ERROR: Both REST API and Search API failed" >&2
                echo '{"source": "error", "repos": []}'
                exit 1
              fi
            fi
          fi
        output: "microsoft_repos"
        timeout: 300
        retry:
          max_attempts: 3
          backoff: "exponential"
          initial_delay: 10

      - id: "discover-community-repos"
        condition: "{{include_community}} == 'true'"
        type: "bash"
        parse_json: true
        command: |
          # Fetch MODULES.md and extract community repos
          curl -sL --retry 3 "https://raw.githubusercontent.com/microsoft/amplifier/main/docs/MODULES.md" > "{{working_dir}}/MODULES.md"
          
          # Extract community repos from tables (non-microsoft repos)
          # Look for GitHub URLs that aren't microsoft org
          COMMUNITY_REPOS=$(grep -oE 'https://github\.com/[^/]+/amplifier[^)"\s]*' "{{working_dir}}/MODULES.md" 2>/dev/null | \
            grep -v 'microsoft/' | \
            sort -u | \
            while read url; do
              # Clean up URL and extract owner/name
              clean_url=$(echo "$url" | tr -d ')' | tr -d '"')
              owner=$(echo "$clean_url" | sed 's|https://github.com/||' | cut -d/ -f1)
              name=$(echo "$clean_url" | sed 's|https://github.com/||' | cut -d/ -f2)
              if [ -n "$owner" ] && [ -n "$name" ]; then
                echo "{\"owner\": \"$owner\", \"name\": \"$name\", \"url\": \"$clean_url\"}"
              fi
            done | jq -s '.' || echo "[]")
          
          jq -n --argjson repos "$COMMUNITY_REPOS" '{source: "community", repos: $repos}'
        output: "community_repos"
        timeout: 60
        on_error: "continue"

      - id: "merge-repo-lists"
        type: "bash"
        parse_json: true
        command: |
          INCLUDE_COMMUNITY='{{include_community}}'
          WORKING_DIR='{{working_dir}}'
          
          # Write microsoft_repos to temp file to avoid variable size limits
          cat << 'MS_REPOS_EOF' > "$WORKING_DIR/microsoft_repos.json"
          {{microsoft_repos}}
          MS_REPOS_EOF
          
          # Write community_repos to temp file
          cat << 'COMMUNITY_EOF' > "$WORKING_DIR/community_repos.json"
          {{community_repos}}
          COMMUNITY_EOF
          
          # Debug: Show what we received
          echo "DEBUG: microsoft_repos size: $(wc -c < "$WORKING_DIR/microsoft_repos.json") bytes" >&2
          echo "DEBUG: microsoft_repos repo count: $(jq '.repos | length' "$WORKING_DIR/microsoft_repos.json" 2>/dev/null || echo 'parse error')" >&2
          
          if [ "$INCLUDE_COMMUNITY" = "true" ]; then
            # Merge Microsoft and community repos, deduplicate
            jq --slurpfile community "$WORKING_DIR/community_repos.json" '
              .repos += ($community[0].repos // []) |
              .repos = (.repos | unique_by(.name)) |
              .total = (.repos | length) |
              .microsoft_count = ([.repos[] | select(.owner == "microsoft")] | length) |
              .community_count = ([.repos[] | select(.owner != "microsoft")] | length) |
              .public_count = ([.repos[] | select(.visibility == "public")] | length) |
              .private_count = ([.repos[] | select(.visibility == "private")] | length)
            ' "$WORKING_DIR/microsoft_repos.json" | tee "$WORKING_DIR/all_repos.json"
          else
            # Microsoft repos only, deduplicate
            jq '
              .repos = (.repos | unique_by(.name)) |
              .total = (.repos | length) |
              .microsoft_count = .total |
              .community_count = 0 |
              .public_count = ([.repos[] | select(.visibility == "public")] | length) |
              .private_count = ([.repos[] | select(.visibility == "private")] | length)
            ' "$WORKING_DIR/microsoft_repos.json" | tee "$WORKING_DIR/all_repos.json"
          fi
        output: "all_repos"
        timeout: 30
        on_error: "fail"

      - id: "check-repo-limit"
        type: "bash"
        parse_json: true
        command: |
          MAX_REPOS={{max_repos}}
          
          # Debug: Check what we received
          echo "DEBUG: all_repos variable length: ${#ALL_REPOS_RAW}" >&2
          
          # Get total from all_repos - handle empty/malformed gracefully
          TOTAL=$(echo '{{all_repos}}' | jq -r '.total // 0' 2>/dev/null || echo "0")
          
          # Validate TOTAL is a number
          if ! [[ "$TOTAL" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Could not parse repo count from all_repos. Got: '$TOTAL'" >&2
            echo "all_repos content preview: $(echo '{{all_repos}}' | head -c 200)" >&2
            TOTAL=0
          fi
          
          echo "DEBUG: Parsed TOTAL=$TOTAL, MAX_REPOS=$MAX_REPOS" >&2
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "ERROR: No repositories found or failed to parse repo list" >&2
            jq -n '{
              exceeded: false,
              total: 0,
              max: '"$MAX_REPOS"',
              error: "No repositories found"
            }'
            exit 1
          elif [ "$TOTAL" -gt "$MAX_REPOS" ]; then
            echo "ERROR: Found $TOTAL repos, which exceeds max_repos limit of $MAX_REPOS" >&2
            echo "This is likely a discovery bug. Please investigate." >&2
            jq -n --argjson total "$TOTAL" --argjson max "$MAX_REPOS" '{
              exceeded: true,
              total: $total,
              max: $max,
              error: "Repository count exceeds safety limit"
            }'
            exit 1
          else
            echo "Repository count ($TOTAL) is within limit ($MAX_REPOS)" >&2
            jq -n --argjson total "$TOTAL" --argjson max "$MAX_REPOS" '{
              exceeded: false,
              total: $total,
              max: $max
            }'
          fi
        output: "repo_limit_check"
        timeout: 30
        on_error: "fail"

      - id: "split-into-batches"
        type: "bash"
        parse_json: true
        command: |
          set -euo pipefail
          WORKING_DIR="{{working_dir}}"
          BATCH_SIZE={{batch_size}}
          AUDIT_VIS="{{audit_visibility}}"

          mkdir -p "$WORKING_DIR/batches"

          # Partition repos by visibility.
          jq '[.repos[] | select(.visibility == "public")]' \
            "$WORKING_DIR/all_repos.json" > "$WORKING_DIR/public_repos.json"
          jq '[.repos[] | select(.visibility != "public")]' \
            "$WORKING_DIR/all_repos.json" > "$WORKING_DIR/private_repos.json"

          PUBLIC_COUNT=$(jq 'length' "$WORKING_DIR/public_repos.json")
          PRIVATE_COUNT=$(jq 'length' "$WORKING_DIR/private_repos.json")

          INCLUDE_PUBLIC=true
          INCLUDE_PRIVATE=true
          case "$AUDIT_VIS" in
            public)  INCLUDE_PRIVATE=false ;;
            private) INCLUDE_PUBLIC=false ;;
            all|"")  ;;  # both included
            *) echo "ERROR: invalid audit_visibility '$AUDIT_VIS' (expected all|public|private)" >&2; exit 1 ;;
          esac

          PUBLIC_BATCHES=()
          PRIVATE_BATCHES=()
          ALL_BATCHES=()

          # Chunk public repos.
          if [ "$INCLUDE_PUBLIC" = "true" ] && [ "$PUBLIC_COUNT" -gt 0 ]; then
            i=1
            while read -r chunk; do
              [ -z "$chunk" ] && continue
              BATCH_ID=$(printf "batch-pub-%02d" "$i")
              OUT="$WORKING_DIR/batches/${BATCH_ID}.json"
              jq -n \
                --arg id "$BATCH_ID" \
                --arg vis "public" \
                --argjson repos "$chunk" \
                '{batch_id: $id, visibility: $vis, repos: $repos}' > "$OUT"
              PUBLIC_BATCHES+=("$OUT")
              ALL_BATCHES+=("$OUT")
              i=$((i + 1))
            done < <(jq -c "_nwise($BATCH_SIZE)" "$WORKING_DIR/public_repos.json")
          fi

          # Chunk private repos (always after public for ordered execution).
          if [ "$INCLUDE_PRIVATE" = "true" ] && [ "$PRIVATE_COUNT" -gt 0 ]; then
            i=1
            while read -r chunk; do
              [ -z "$chunk" ] && continue
              BATCH_ID=$(printf "batch-priv-%02d" "$i")
              OUT="$WORKING_DIR/batches/${BATCH_ID}.json"
              jq -n \
                --arg id "$BATCH_ID" \
                --arg vis "private" \
                --argjson repos "$chunk" \
                '{batch_id: $id, visibility: $vis, repos: $repos}' > "$OUT"
              PRIVATE_BATCHES+=("$OUT")
              ALL_BATCHES+=("$OUT")
              i=$((i + 1))
            done < <(jq -c "_nwise($BATCH_SIZE)" "$WORKING_DIR/private_repos.json")
          fi

          # Build the JSON output consumed by downstream steps. Use
          # printf-piped-into-jq pattern so empty arrays serialise correctly.
          ALL_BATCHES_JSON=$(printf '%s\n' "${ALL_BATCHES[@]:-}" | jq -R . | jq -s 'map(select(length > 0))')
          PUBLIC_BATCHES_JSON=$(printf '%s\n' "${PUBLIC_BATCHES[@]:-}" | jq -R . | jq -s 'map(select(length > 0))')
          PRIVATE_BATCHES_JSON=$(printf '%s\n' "${PRIVATE_BATCHES[@]:-}" | jq -R . | jq -s 'map(select(length > 0))')

          jq -n \
            --argjson public_count "$PUBLIC_COUNT" \
            --argjson private_count "$PRIVATE_COUNT" \
            --arg audit_visibility "$AUDIT_VIS" \
            --argjson batch_size "$BATCH_SIZE" \
            --argjson batch_files "$ALL_BATCHES_JSON" \
            --argjson public_batches "$PUBLIC_BATCHES_JSON" \
            --argjson private_batches "$PRIVATE_BATCHES_JSON" \
            '{
              public_count: $public_count,
              private_count: $private_count,
              audit_visibility: $audit_visibility,
              batch_size: $batch_size,
              batch_files: $batch_files,
              public_batches: $public_batches,
              private_batches: $private_batches,
              total_batches: ($batch_files | length),
              public_batch_count: ($public_batches | length),
              private_batch_count: ($private_batches | length)
            }'
        output: "split"
        timeout: 60
        on_error: "fail"

      - id: "create-audit-plan"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        prompt: |
          Create an audit plan summary for review before proceeding. Return ONLY the markdown content.

          ## Discovered Repositories

          {{all_repos}}

          ## Batch Plan

          {{split}}

          ## Audit Configuration

          - **Create Fix PRs**: {{create_fix_prs}}
          - **Dry-Run Mode**: {{dry_run}}
          - **Include Community Repos**: {{include_community}}
          - **Max Repos Limit**: {{max_repos}}
          - **Batch Size**: {{batch_size}}
          - **Audit Visibility**: {{audit_visibility}}
          - **Working Directory**: {{working_dir}}

          ## Output Required

          Generate this exact markdown structure (substituting real values):

          ## Amplifier Ecosystem Audit Plan

          **Date**: [current date]
          **Total Repositories**: [from all_repos.total]
          - Public repos: [from split.public_count]
          - Private repos: [from split.private_count]
          - Community repos: [if include_community is true, count from all_repos]

          **Audit Visibility Filter**: [from split.audit_visibility — note clearly if a group is being skipped]
          **Batch Size**: [from split.batch_size]
          **Total Batches**: [from split.total_batches] ([from split.public_batch_count] public, [from split.private_batch_count] private)

          ### Execution Plan

          1. Public batches run first (sequentially), one batch at a time.
          2. Private batches run after all public batches complete.
          3. Each batch processes its repos in parallel (default 2 concurrent).
          4. Findings flushed to disk as JSONL after each batch.

          Estimated total wall time: ~[(public_count + private_count) * 75 / 2 / 60 minutes, rounded]

          ### Public Batches ([from split.public_batch_count])

          List one row per public batch file from split.public_batches. Resolve
          repo counts by reading the underlying JSON.
          | # | Batch ID | Repo count |
          |---|----------|------------|
          | 1 | batch-pub-01 | NN |
          | ... | ... | ... |

          ### Private Batches ([from split.private_batch_count])

          | # | Batch ID | Repo count |
          |---|----------|------------|
          | 1 | batch-priv-01 | NN |
          | ... | ... | ... |

          ### Public Repositories

          | # | Repository | Description |
          |---|------------|-------------|
          | 1 | repo-name | description |
          | ... | ... | ... |

          ### Private Repositories

          | # | Repository | Description |
          |---|------------|-------------|
          | 1 | repo-name | description |
          | ... | ... | ... |

          #### Community (if applicable)

          | # | Repository | Owner | Description |
          |---|------------|-------|-------------|
          | 1 | repo-name | owner | description |

          ### Audit Checks Per Repository

          1. Listed in MODULES.md (public repos only)
          2. CODE_OF_CONDUCT.md (verbatim match)
          3. SECURITY.md (verbatim match)
          4. SUPPORT.md (verbatim match)
          5. LICENSE (verbatim match)
          6. README.md Contributing section
          7. README.md Trademarks section
          8. GitHub Issues status
          9. Open PRs and recent activity

          Public repos audited against full Microsoft OSS standards.
          Private repos audited against internal compliance standards.

          ### Fix PRs

          Fix PR creation: [Enabled/Disabled]
          Note: Fix PRs for private repos can be skipped if desired.
        output: "audit_plan"
        timeout: 180
        on_error: "fail"

    approval:
      required: true
      prompt: |
        ## Ready for Ecosystem Audit
        
        {{audit_plan}}
        
        **Approve** to begin auditing all repositories.
        **Deny** to adjust configuration or repository list.
      timeout: 0
      default: "deny"

  # ==========================================================================
  # STAGE 2: Per-Repository Audits
  # ==========================================================================
  - name: "audits"
    steps:
      - id: "audit-batches"
        foreach: "{{split.batch_files}}"
        as: "batch_file"
        parallel: 1                     # sequential batches (public-first, then private)
        max_iterations: 100             # explicit ceiling — adjust if batch_size shrinks
        collect: "batch_results"
        type: "recipe"
        recipe: "ecosystem-audit-batch.yaml"
        context:
          batch_file: "{{batch_file}}"
          working_dir: "{{working_dir}}"
          create_fix_pr: "{{create_fix_prs}}"
          dry_run: "{{dry_run}}"
        output: "batch_outcome"
        timeout: 10800                  # 3h per batch (generous for batch_size=25)
        on_error: "continue"

  # ==========================================================================
  # STAGE 3: Aggregation and Reporting
  # ==========================================================================
  - name: "reporting"
    steps:
      - id: "collect-individual-reports"
        type: "bash"
        command: |
          set -euo pipefail
          echo "Collecting individual audit reports..."
          
          REPORTS_DIR="{{working_dir}}/repos"
          SUMMARY_FILE="{{working_dir}}/reports/individual-summaries.txt"
          
          > "$SUMMARY_FILE"
          
          for report in "$REPORTS_DIR"/*/audit-report.md; do
            if [ -f "$report" ]; then
              REPO_NAME=$(basename "$(dirname "$report")")
              echo "=== $REPO_NAME ===" >> "$SUMMARY_FILE"
              # Extract just the summary table and overall status
              sed -n '/^## Summary/,/^## Detailed/p' "$report" | head -30 >> "$SUMMARY_FILE"
              echo "" >> "$SUMMARY_FILE"
            fi
          done
          
          echo "Collected $(ls -1 "$REPORTS_DIR"/*/audit-report.md 2>/dev/null | wc -l) reports"
          cat "$SUMMARY_FILE"
        output: "collected_reports"
        timeout: 120
        on_error: "continue"

      - id: "aggregate-results"
        type: "bash"
        parse_json: true
        command: |
          set -euo pipefail
          FINDINGS_DIR="{{working_dir}}/findings"

          if [ ! -d "$FINDINGS_DIR" ]; then
            echo "ERROR: findings directory missing: $FINDINGS_DIR" >&2
            jq -n '{total_repos: 0, error: "no findings directory"}'
            exit 0
          fi

          # Initialise counters
          TOTAL=0
          PASS=0
          ATTENTION=0
          CRITICAL=0
          PUBLIC_TOTAL=0
          PRIVATE_TOTAL=0

          # Per-status repo lists (build as JSON arrays via jq)
          REPOS_PASS_TMP=$(mktemp)
          REPOS_ATTENTION_TMP=$(mktemp)
          REPOS_CRITICAL_TMP=$(mktemp)
          PUBLIC_REPOS_TMP=$(mktemp)
          PRIVATE_REPOS_TMP=$(mktemp)
          trap 'rm -f "$REPOS_PASS_TMP" "$REPOS_ATTENTION_TMP" "$REPOS_CRITICAL_TMP" "$PUBLIC_REPOS_TMP" "$PRIVATE_REPOS_TMP"' EXIT

          # Walk every JSONL findings file (one per batch).
          # Each line: {repo, owner, status, visibility, batch_id}
          shopt -s nullglob
          for jsonl in "$FINDINGS_DIR"/*.jsonl; do
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              REPO=$(echo "$line" | jq -r '.repo')
              STATUS=$(echo "$line" | jq -r '.status')
              VISIBILITY=$(echo "$line" | jq -r '.visibility')

              TOTAL=$((TOTAL + 1))

              if [ "$VISIBILITY" = "public" ]; then
                PUBLIC_TOTAL=$((PUBLIC_TOTAL + 1))
                echo "$REPO" >> "$PUBLIC_REPOS_TMP"
              else
                PRIVATE_TOTAL=$((PRIVATE_TOTAL + 1))
                echo "$REPO" >> "$PRIVATE_REPOS_TMP"
              fi

              case "$STATUS" in
                PASS)
                  PASS=$((PASS + 1))
                  echo "$REPO" >> "$REPOS_PASS_TMP"
                  ;;
                CRITICAL)
                  CRITICAL=$((CRITICAL + 1))
                  echo "$REPO" >> "$REPOS_CRITICAL_TMP"
                  ;;
                *)
                  ATTENTION=$((ATTENTION + 1))
                  echo "$REPO" >> "$REPOS_ATTENTION_TMP"
                  ;;
              esac
            done < "$jsonl"
          done

          # Convert tmp files to JSON arrays.
          jq_array_from_lines() {
            local f="$1"
            if [ -s "$f" ]; then
              jq -R -s -c 'split("\n") | map(select(length > 0))' "$f"
            else
              echo "[]"
            fi
          }

          REPOS_PASS=$(jq_array_from_lines "$REPOS_PASS_TMP")
          REPOS_ATTENTION=$(jq_array_from_lines "$REPOS_ATTENTION_TMP")
          REPOS_CRITICAL=$(jq_array_from_lines "$REPOS_CRITICAL_TMP")
          PUBLIC_REPOS=$(jq_array_from_lines "$PUBLIC_REPOS_TMP")
          PRIVATE_REPOS=$(jq_array_from_lines "$PRIVATE_REPOS_TMP")

          jq -n \
            --argjson total "$TOTAL" \
            --argjson pass "$PASS" \
            --argjson attention "$ATTENTION" \
            --argjson critical "$CRITICAL" \
            --argjson public_total "$PUBLIC_TOTAL" \
            --argjson private_total "$PRIVATE_TOTAL" \
            --argjson repos_pass "$REPOS_PASS" \
            --argjson repos_attention "$REPOS_ATTENTION" \
            --argjson repos_critical "$REPOS_CRITICAL" \
            --argjson public_repos "$PUBLIC_REPOS" \
            --argjson private_repos "$PRIVATE_REPOS" \
            '{
              total_repos: $total,
              by_status: {
                pass: $pass,
                needs_attention: $attention,
                critical: $critical
              },
              by_visibility: {
                public: $public_total,
                private: $private_total
              },
              repos_passing: $repos_pass,
              repos_needing_attention: $repos_attention,
              repos_critical: $repos_critical,
              public_repos: $public_repos,
              private_repos: $private_repos
            }'
        output: "aggregate_data"
        timeout: 120
        on_error: "continue"

      - id: "generate-ecosystem-report"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        prompt: |
          Generate the comprehensive ecosystem audit report. Return ONLY the markdown content - do NOT write to files.
          
          ## Input Data
          
          - **Aggregate Data**: {{aggregate_data}}
          - **Audit Plan**: {{audit_plan}}
          - **Individual Report Summaries**: {{collected_reports}}
          
          ## Report Structure Required
          
          Generate this markdown report:
          
          # Amplifier Ecosystem Audit Report
          
          **Generated**: [current date/time]
          **Repositories Audited**: [total count]
          - Public: [count]
          - Private: [count]
          
          ## Executive Summary
          
          | Status | Count | Percentage |
          |--------|-------|------------|
          | PASS | N | X% |
          | NEEDS ATTENTION | N | X% |
          | CRITICAL | N | X% |
          
          **Key Findings**:
          - [Top 3-5 most important findings across ecosystem]
          
          ## Compliance Overview
          
          Based on the individual audit results, provide:
          - Overall ecosystem health assessment
          - Common patterns of compliance/non-compliance
          - Priority areas for improvement
          
          ## Public Repositories ([count])
          
          ### Passing
          [List public repos that passed all checks]
          
          ### Needs Attention
          [List public repos with warnings or recommendations]
          
          ### Critical
          [List public repos with critical issues]
          
          ## Private Repositories ([count])
          
          ### Passing
          [List private repos that passed all checks]
          
          ### Needs Attention
          [List private repos with warnings or recommendations]
          
          ### Critical
          [List private repos with critical issues]
          
          ## Repository Details
          
          For each repository, summarize:
          - Visibility (public/private)
          - Overall status
          - Key issues found
          - Recommended actions
          
          ## Remediation Priority
          
          Prioritized list of actions:
          1. [Highest priority fixes - critical issues]
          2. [Medium priority - warnings]
          3. [Lower priority - recommendations]
          
          Note: Fix PRs are typically created for public repos. Private repo
          issues are reported for awareness but may follow different remediation
          processes.
          
          ## Next Steps
          
          1. [Immediate actions]
          2. [Short-term improvements]
          3. [Long-term governance recommendations]
          
          ---
          *Generated by Amplifier ecosystem-audit recipe v2.0.0*
        output: "ecosystem_report_content"
        timeout: 600
        on_error: "fail"

      - id: "write-ecosystem-report"
        type: "bash"
        command: |
          set -euo pipefail
          REPORT_PATH="{{working_dir}}/reports/{{report_filename}}"
          mkdir -p "$(dirname "$REPORT_PATH")"
          
          cat << 'REPORT_EOF' > "$REPORT_PATH.tmp"
          {{ecosystem_report_content}}
          REPORT_EOF
          
          mv "$REPORT_PATH.tmp" "$REPORT_PATH"
          echo "Ecosystem report written: $REPORT_PATH ($(wc -c < "$REPORT_PATH") bytes)"
        output: "report_write_result"
        timeout: 30
        on_error: "fail"

      - id: "save-aggregate-data"
        type: "bash"
        command: |
          cat << 'JSON_EOF' > "{{working_dir}}/reports/aggregate-data.json"
          {{aggregate_data}}
          JSON_EOF
          
          echo "Aggregate data saved to: {{working_dir}}/reports/aggregate-data.json"
        output: "aggregate_save_result"
        timeout: 30
        on_error: "continue"

      - id: "completion-summary"
        type: "bash"
        command: |
          set -euo pipefail
          REPORT_PATH="{{working_dir}}/reports/{{report_filename}}"
          
          echo "========================================"
          echo "AMPLIFIER ECOSYSTEM AUDIT COMPLETE"
          echo "========================================"
          echo ""
          echo "Main Report: $(realpath "$REPORT_PATH" 2>/dev/null || echo "$REPORT_PATH")"
          echo "Aggregate Data: {{working_dir}}/reports/aggregate-data.json"
          echo ""
          echo "Individual Reports:"
          ls -1 "{{working_dir}}/repos"/*/audit-report.md 2>/dev/null | head -20 || echo "  (none found)"
          echo ""
          echo "========================================"
          echo ""
          
          # Show summary stats
          echo "Quick Stats:"
          cat "{{working_dir}}/reports/aggregate-data.json" 2>/dev/null | jq -r '
            "  Total repos: \(.total_repos)",
            "    Public: \(.by_visibility.public // 0)",
            "    Private: \(.by_visibility.private // 0)",
            "  Passing: \(.by_status.pass)",
            "  Needs attention: \(.by_status.needs_attention)", 
            "  Critical: \(.by_status.critical)"
          ' || echo "  (stats not available)"
          
          echo ""
          echo "Full Report:"
          echo ""
          cat "$REPORT_PATH" 2>/dev/null || echo "(Report not found at $REPORT_PATH)"
        output: "final_output"
        timeout: 60
        on_error: "continue"
