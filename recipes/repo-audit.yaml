  # ==========================================================================
  # STEP 7d: Check Branch Protection
  # ==========================================================================
  - id: "check-branch-protection"
    type: "bash"
    parse_json: true
    command: |
      cat << 'REPO_JSON_EOF' > /tmp/repo_bp_$$.json
      {{repo_info_raw}}
      REPO_JSON_EOF

      DEFAULT_BRANCH=$(jq -r '.defaultBranchRef.name // "main"' /tmp/repo_bp_$$.json)
      IS_PRIVATE=$(jq -r '.isPrivate // false' /tmp/repo_bp_$$.json)
      rm -f /tmp/repo_bp_$$.json

      # Private repos are out of scope for the canonical ruleset / branch
      # protection policy. Auditing them against public-repo expectations
      # produces 100% false-positive findings (every private repo flags the
      # same way) and obscures real issues. Emit a single "pass" verdict
      # noting the skip and exit early.
      if [ "$IS_PRIVATE" = "true" ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{has_protection: null, severity: "pass", finding: ("Branch protection check skipped: private repo (canonical ruleset is not applied to private repos per policy)")}'
        exit 0
      fi

      REPO="{{repo_owner}}/{{repo_name}}"

      # Probe rules-in-effect on the default branch.
      RULES_RAW=$(gh api "repos/$REPO/rules/branches/$DEFAULT_BRANCH" 2>&1 || echo "FETCH_FAILED")

      if [ "$RULES_RAW" = "FETCH_FAILED" ] || echo "$RULES_RAW" | grep -qE "Not Found"; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{has_protection: false, severity: "error", finding: ("No branch protection on default branch (" + $branch + ") - no repository ruleset is in effect, push/merge is unrestricted")}'
      else
        PR_RULE_COUNT=$(echo "$RULES_RAW" | jq -r '[.[] | select(.type == "pull_request" and ((.parameters.required_approving_review_count // 0) >= 1))] | length' 2>/dev/null || echo "0")
        if [ "$PR_RULE_COUNT" -ge 1 ]; then
          jq -n --arg branch "$DEFAULT_BRANCH" \
            '{has_protection: true, severity: "pass", finding: ("Branch protection on default branch (" + $branch + ") configured via repository ruleset (pull_request rule with required reviews active)")}'
        else
          jq -n --arg branch "$DEFAULT_BRANCH" \
            '{has_protection: false, severity: "error", finding: ("Repository ruleset present on default branch (" + $branch + ") but no pull_request rule requires approving reviews. Update the ruleset to require at least 1 approving review before merge.")}'
        fi
      fi
    output: "branch_protection_check"
    timeout: 60
    on_error: "continue"

  # ==========================================================================
  # STEP 7e: Check Bypass Actors (mixed severity: error / warning / pass)
  # ==========================================================================
  # Verifies that the maintainer/owner bypass model is configured correctly so
  # that trusted contributors can self-merge their own PRs without external
  # review, AND that the bypass mode does not silently undermine the security
  # floor enforced by check-branch-protection.
  #
  # Severity model:
  #   - error:   any bypass actor uses bypass_mode=always. This permits direct
  #              pushes to the default branch, bypassing the pull_request rule
  #              entirely and leaving no audit trail. Bypass mode must be
  #              pull_request so that bypass remains a recorded action on PR
  #              merges and direct pushes stay blocked.
  #   - error:   ruleset present but no bypass actors configured, AND the repo
  #              is owned by microsoft. The canonical bypass pattern is the
  #              org-wide convention for amplifier-* repos; absence is a
  #              deviation (not merely a convenience issue). PRs cannot be
  #              admin-merged on repos missing this configuration.
  #   - warning: ruleset present but no bypass actors configured, for repos NOT
  #              owned by microsoft (forks, personal projects). Maintainers and
  #              owners will be required to wait for external review on their
  #              own PRs. Convenience issue, not a security violation.
  #   - pass:    at least one bypass actor configured, all using bypass_mode
  #              of pull_request (none using always).
  - id: "check-bypass-actors"
    type: "bash"
    parse_json: true
    command: |
      cat << 'REPO_JSON_EOF' > /tmp/repo_bypass_$$.json
      {{repo_info_raw}}
      REPO_JSON_EOF

      DEFAULT_BRANCH=$(jq -r '.defaultBranchRef.name // "main"' /tmp/repo_bypass_$$.json)
      IS_PRIVATE=$(jq -r '.isPrivate // false' /tmp/repo_bypass_$$.json)
      rm -f /tmp/repo_bypass_$$.json

      # Private repos are out of scope for the canonical ruleset / bypass
      # actor policy (the canonical ruleset is not applied to private repos).
      # Without a ruleset there are no bypass actors to evaluate, and the
      # check would otherwise emit a misleading "no ruleset configured"
      # warning that adds noise without surfacing actionable information.
      # Emit a single "pass" verdict noting the skip and exit early.
      if [ "$IS_PRIVATE" = "true" ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{has_bypass: null, severity: "pass", finding: ("Bypass actors check skipped: private repo (canonical ruleset is not applied to private repos per policy)")}'
        exit 0
      fi

      REPO="{{repo_owner}}/{{repo_name}}"

      # Enumerate active branch rulesets and check bypass_actors on those that target the default branch.
      RULESETS_RAW=$(gh api "repos/$REPO/rulesets" 2>&1 || echo "FETCH_FAILED")
      RULESET_PRESENT=false
      RULESET_BYPASS_TOTAL=0
      RULESET_ALWAYS_TOTAL=0
      if [ "$RULESETS_RAW" != "FETCH_FAILED" ] && ! echo "$RULESETS_RAW" | grep -qE "Not Found"; then
        RULESET_IDS=$(echo "$RULESETS_RAW" | jq -r '.[] | select(.enforcement == "active" and .target == "branch") | .id' 2>/dev/null || echo "")
        for RID in $RULESET_IDS; do
          DETAIL=$(gh api "repos/$REPO/rulesets/$RID" 2>&1 || echo "FETCH_FAILED")
          [ "$DETAIL" = "FETCH_FAILED" ] && continue
          MATCHES=$(echo "$DETAIL" | jq --arg branch "$DEFAULT_BRANCH" '(.conditions.ref_name.include // []) | any(. == "~DEFAULT_BRANCH" or . == ("refs/heads/" + $branch))' 2>/dev/null || echo "false")
          if [ "$MATCHES" = "true" ]; then
            RULESET_PRESENT=true
            COUNT=$(echo "$DETAIL" | jq -r '(.bypass_actors // []) | length' 2>/dev/null || echo "0")
            RULESET_BYPASS_TOTAL=$((RULESET_BYPASS_TOTAL + COUNT))
            ALWAYS_COUNT=$(echo "$DETAIL" | jq -r '[(.bypass_actors // [])[] | select(.bypass_mode == "always")] | length' 2>/dev/null || echo "0")
            RULESET_ALWAYS_TOTAL=$((RULESET_ALWAYS_TOTAL + ALWAYS_COUNT))
          fi
        done
      fi

      if [ "$RULESET_ALWAYS_TOTAL" -ge 1 ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" --arg count "$RULESET_ALWAYS_TOTAL" \
          '{has_bypass: true, severity: "error", finding: ("Repository ruleset on " + $branch + " has " + $count + " bypass actor(s) with bypass_mode=always. This permits direct pushes to the default branch, bypassing the pull_request rule entirely and leaving no audit trail. Change bypass_mode to pull_request for all bypass actors so that bypass remains an explicit, recorded action on PR merges only.")}'
      elif [ "$RULESET_BYPASS_TOTAL" -ge 1 ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" --arg count "$RULESET_BYPASS_TOTAL" \
          '{has_bypass: true, severity: "pass", finding: ("Bypass actors configured on " + $branch + " via repository ruleset (" + $count + " bypass actors with bypass_mode=pull_request) - maintainers/owners can self-merge")}'
      elif [ "$RULESET_PRESENT" = "true" ]; then
        if [ "{{repo_owner}}" = "microsoft" ]; then
          jq -n --arg branch "$DEFAULT_BRANCH" \
            '{has_bypass: false, severity: "error", finding: ("Bypass actors not configured on " + $branch + ". Canonical pattern for microsoft/amplifier-* repos: {actor_id: 5, actor_type: RepositoryRole, bypass_mode: pull_request} (Admin role can bypass review on PR merge); {actor_id: 16902513, actor_type: Team, bypass_mode: pull_request} (octo-made-amplifier-maintainers Team can bypass review on PR merge). Configure both on the default-branch ruleset to match org-wide convention.")}'
        else
          jq -n --arg branch "$DEFAULT_BRANCH" \
            '{has_bypass: false, severity: "warning", finding: ("Repository ruleset on " + $branch + " has no bypass actors configured. Maintainers and owners will be required to get external review on their own PRs (convenience issue, not security).")}'
        fi
      else
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{has_bypass: false, severity: "warning", finding: ("Cannot evaluate bypass actors - no repository ruleset configured on " + $branch + " (see Branch Protection check above)")}'
      fi
    output: "bypass_actors_check"
    timeout: 60
    on_error: "continue"

  # ==========================================================================
  # STEP 7f: Check PR Rule Strictness (microsoft/* repos — warning severity)
  # ==========================================================================
  # Verifies that the three supplemental PR review settings used by the
  # canonical microsoft/amplifier-* convention are in place.  These are recommended but not as critical
  # as bypass actor configuration (hence warning, not error):
  #   - dismiss_stale_reviews_on_push: true  (reviews reset on new commits)
  #   - required_review_thread_resolution: true  (threads must be resolved)
  #   - required_linear_history rule present  (no merge commits on main)
  #
  # Severity model:
  #   - pass:    all three match the canonical configuration, OR this is a
  #              non-microsoft / private repo (check not applicable)
  #   - warning: one or more settings deviate from the canonical configuration
  - id: "check-pr-rule-strictness"
    type: "bash"
    parse_json: true
    command: |
      cat << 'REPO_JSON_EOF' > /tmp/repo_prstrictness_$$.json
      {{repo_info_raw}}
      REPO_JSON_EOF

      DEFAULT_BRANCH=$(jq -r '.defaultBranchRef.name // "main"' /tmp/repo_prstrictness_$$.json)
      IS_PRIVATE=$(jq -r '.isPrivate // false' /tmp/repo_prstrictness_$$.json)
      rm -f /tmp/repo_prstrictness_$$.json

      # This check only applies to microsoft/* public repos.
      # The canonical amplifier-* convention does not govern non-microsoft repos.
      if [ "{{repo_owner}}" != "microsoft" ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{severity: "pass", finding: "PR rule strictness check not applicable (non-microsoft repo)"}'
        exit 0
      fi

      # Private repos are out of scope for the canonical ruleset policy.
      if [ "$IS_PRIVATE" = "true" ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{severity: "pass", finding: "PR rule strictness check skipped: private repo (canonical ruleset is not applied to private repos per policy)"}'
        exit 0
      fi

      REPO="{{repo_owner}}/{{repo_name}}"

      # Enumerate active branch rulesets targeting the default branch.
      RULESETS_RAW=$(gh api "repos/$REPO/rulesets" 2>&1 || echo "FETCH_FAILED")
      if [ "$RULESETS_RAW" = "FETCH_FAILED" ] || echo "$RULESETS_RAW" | grep -qE "Not Found"; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{severity: "warning", finding: ("Cannot evaluate PR rule strictness - no rulesets accessible on " + $branch + " (see Branch Protection check above)")}'
        exit 0
      fi

      DISMISS_STALE="false"
      THREAD_RESOLUTION="false"
      LINEAR_HISTORY="false"

      RULESET_IDS=$(echo "$RULESETS_RAW" | jq -r '.[] | select(.enforcement == "active" and .target == "branch") | .id' 2>/dev/null || echo "")
      for RID in $RULESET_IDS; do
        DETAIL=$(gh api "repos/$REPO/rulesets/$RID" 2>&1 || echo "FETCH_FAILED")
        [ "$DETAIL" = "FETCH_FAILED" ] && continue
        MATCHES=$(echo "$DETAIL" | jq --arg branch "$DEFAULT_BRANCH" '(.conditions.ref_name.include // []) | any(. == "~DEFAULT_BRANCH" or . == ("refs/heads/" + $branch))' 2>/dev/null || echo "false")
        if [ "$MATCHES" = "true" ]; then
          # Check dismiss_stale_reviews_on_push in pull_request rule parameters
          DS=$(echo "$DETAIL" | jq -r '[.rules[] | select(.type == "pull_request") | .parameters.dismiss_stale_reviews_on_push // false] | any' 2>/dev/null || echo "false")
          [ "$DS" = "true" ] && DISMISS_STALE="true"
          # Check required_review_thread_resolution in pull_request rule parameters
          TR=$(echo "$DETAIL" | jq -r '[.rules[] | select(.type == "pull_request") | .parameters.required_review_thread_resolution // false] | any' 2>/dev/null || echo "false")
          [ "$TR" = "true" ] && THREAD_RESOLUTION="true"
          # Check for presence of a required_linear_history rule
          LH=$(echo "$DETAIL" | jq -r '[.rules[] | select(.type == "required_linear_history")] | length' 2>/dev/null || echo "0")
          [ "$LH" -ge 1 ] && LINEAR_HISTORY="true"
        fi
      done

      MISSING=""
      [ "$DISMISS_STALE" != "true" ] && MISSING="${MISSING:+$MISSING, }dismiss_stale_reviews_on_push=true"
      [ "$THREAD_RESOLUTION" != "true" ] && MISSING="${MISSING:+$MISSING, }required_review_thread_resolution=true"
      [ "$LINEAR_HISTORY" != "true" ] && MISSING="${MISSING:+$MISSING, }required_linear_history rule"

      if [ -z "$MISSING" ]; then
        jq -n --arg branch "$DEFAULT_BRANCH" \
          '{severity: "pass", finding: ("PR rule strictness matches canonical amplifier-* configuration on " + $branch + " (dismiss_stale_reviews_on_push=true, required_review_thread_resolution=true, required_linear_history rule present)")}'
      else
        jq -n --arg branch "$DEFAULT_BRANCH" --arg missing "$MISSING" \
          '{severity: "warning", finding: ("PR rule strictness deviates from canonical amplifier-* configuration on " + $branch + ". Missing: " + $missing + ". Canonical pattern: dismiss_stale_reviews_on_push=true, required_review_thread_resolution=true, required_linear_history rule present.")}'
      fi
    output: "pr_rule_strictness_check"
    timeout: 90
    on_error: "continue"

  # ==========================================================================
  # STEP 8: Get Repository Stats
  # ==========================================================================
  - id: "get-repo-stats"
    type: "bash"
    parse_json: true
    command: |
      REPO="{{repo_owner}}/{{repo_name}}"
      
      # Get open PRs
      OPEN_PRS=$(gh pr list -R "$REPO" --state open --json number,title,author,createdAt,url 2>/dev/null || echo "[]")
      PR_COUNT=$(echo "$OPEN_PRS" | jq 'length')
      
      # Get recent commits (last 7 days) - handle both Linux and macOS date
      SINCE_DATE=$(date -d '7 days ago' -Iseconds 2>/dev/null || date -v-7d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "2024-01-01T00:00:00Z")
      RECENT_COMMITS=$(gh api "repos/$REPO/commits?since=$SINCE_DATE" 2>/dev/null | jq 'length' || echo "0")
      
      # Get last push date - use heredoc to handle special characters
      cat << 'REPO_PUSH_EOF' > /tmp/repo_push_$$.json
      {{repo_info_raw}}
      REPO_PUSH_EOF
      LAST_PUSH=$(jq -r '.pushedAt // "unknown"' /tmp/repo_push_$$.json)
      rm -f /tmp/repo_push_$$.json
      
      jq -n \
        --argjson open_prs "$PR_COUNT" \
        --argjson recent_commits "${RECENT_COMMITS:-0}" \
        --arg last_push "$LAST_PUSH" \
        --argjson pr_details "$OPEN_PRS" \
        '{
          open_prs: $open_prs,
          recent_commits_7d: $recent_commits,
          last_push: $last_push,
          pr_details: $pr_details
        }'
    output: "repo_stats"
    timeout: 120
    retry:
      max_attempts: 2
      backoff: "linear"
      initial_delay: 3
    on_error: "continue"

  # ==========================================================================
  # STEP 9: Generate Audit Report (LLM generates content only)
  # ==========================================================================
  - id: "generate-report"
    agent: "foundation:zen-architect"
    mode: "ANALYZE"
    prompt: |
      Generate a comprehensive audit report for the repository. Return ONLY the markdown report content - do NOT write to any files.
      
      ## Repository Information
      
      - **Repository**: {{repo_owner}}/{{repo_name}}
      - **Validation**: {{repo_validation}}
      
      ## Audit Results
      
      ### 1. MODULES.md Listing
      {{modules_listing}}
      
      ### 2. Boilerplate Files Check
      {{boilerplate_check}}
      
      ### 3. README.md Sections Check
      {{readme_check}}
      
      ### 4. GitHub Issues Status
      {{issues_check}}
      
      ### 5. Wiki Status
      {{wiki_check}}
      
      ### 6. Projects Status
      {{projects_check}}
      
      ### 7. Branch Protection (default branch)
      {{branch_protection_check}}
      
      ### 8. Bypass Actors
      {{bypass_actors_check}}
      
      ### 9. PR Rule Strictness (microsoft/* repos)
      {{pr_rule_strictness_check}}
      
      ### 10. Repository Stats
      {{repo_stats}}
      
      ## Report Format
      
      Generate a markdown report following this structure:
      
      # Repository Audit Report: {{repo_owner}}/{{repo_name}}
      
      **Audit Date**: [use current date]
      **Repository URL**: https://github.com/{{repo_owner}}/{{repo_name}}
      
      ## Summary
      
      | Check | Status | Severity |
      |-------|--------|----------|
      | Listed in MODULES.md | [Pass/Fail/Recommendation] | [pass/warning/error/recommendation] |
      | CODE_OF_CONDUCT.md | [Match/Mismatch/Missing] | [pass/error] |
      | SECURITY.md | [Match/Mismatch/Missing] | [pass/error] |
      | SUPPORT.md | [Match/Mismatch/Missing] | [pass/error] |
      | LICENSE | [Match/Mismatch/Missing] | [pass/error] |
      | README Contributing | [Match/Mismatch/Missing] | [pass/warning/error] |
      | README Trademarks | [Match/Mismatch/Missing] | [pass/warning/error] |
      | GitHub Issues | [Disabled/Enabled] | [pass/recommendation] |
      | Wiki | [Disabled/Enabled] | [pass/error] |
      | Projects | [Disabled/Enabled] | [pass/error] |
      | Branch Protection | [Configured/Misconfigured/Missing] | [pass/error] |
      | Bypass Actors | [Configured/Empty/N-A] | [pass/warning/error] |
      | PR Rule Strictness | [Pass/Deviates/N-A] | [pass/warning] |
      
      **Overall Status**: [PASS / NEEDS ATTENTION / CRITICAL]
      - Critical issues (errors): N
      - Warnings: N  
      - Recommendations: N
      
      ## Detailed Findings
      
      [Provide details for each check, explaining what was found]
      
      ## Repository Activity
      
      - **Open PRs**: N
      - **Recent commits (7d)**: N
      - **Last push**: [date]
      
      [If there are open PRs, list them with titles and links]
      
      ## Remediation Steps
      
      [For each non-passing issue, provide specific steps to fix]
      
      ---
      *Generated by Amplifier repo-audit recipe v1.6.0*
    output: "audit_report_content"
    timeout: 300
    on_error: "fail"

  # ==========================================================================
  # STEP 10: Write Report to File (Bash - reliable file write)
  # ==========================================================================
  - id: "write-report"
    type: "bash"
    command: |
      set -euo pipefail
      REPORT_PATH="{{working_dir}}/{{repo_name}}/audit-report.md"
      mkdir -p "$(dirname "$REPORT_PATH")"
      
      cat << 'REPORT_CONTENT_EOF' > "$REPORT_PATH.tmp"
      {{audit_report_content}}
      REPORT_CONTENT_EOF
      
      mv "$REPORT_PATH.tmp" "$REPORT_PATH"
      echo "Report written: $REPORT_PATH ($(wc -c < "$REPORT_PATH") bytes)"
    output: "report_write_result"
    timeout: 30
    on_error: "fail"

  # ==========================================================================
  # STEP 11: Prepare Fix PR (Conditional)
  # ==========================================================================
  - id: "prepare-fixes"
    condition: "{{create_fix_pr}} == 'true' or {{dry_run}} == 'true'"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    prompt: |
      Analyze the audit findings and prepare fix recommendations. Return ONLY text output - do NOT write files.
      
      ## Audit Results
      
      Boilerplate check: {{boilerplate_check}}
      README check: {{readme_check}}
      
      ## Reference Files Location
      
      Reference files are available at: {{working_dir}}/reference/
      
      ## Tasks
      
      1. Identify which files need to be fixed based on the audit results
      
      2. For boilerplate files (CODE_OF_CONDUCT.md, SECURITY.md, SUPPORT.md, LICENSE):
         - List which ones need to be copied from reference
      
      3. For README.md sections:
         - Describe what sections need to be updated
         - Note that README content varies so manual integration is needed
      
      4. Create a PR description summarizing what needs to be fixed
      
      5. Provide shell commands that could be used to prepare the fixes
      
      Output a structured summary of what needs to be fixed and how.
    output: "fix_preparation"
    timeout: 300
    on_error: "continue"

  - id: "create-fix-instructions"
    condition: "{{create_fix_pr}} == 'true' or {{dry_run}} == 'true'"
    type: "bash"
    command: |
      REPO="{{repo_owner}}/{{repo_name}}"
      TARGET_DIR="{{working_dir}}/{{repo_name}}"
      REF_DIR="{{working_dir}}/reference"
      FIXES_DIR="$TARGET_DIR/fixes"
      DRY_RUN="{{dry_run}}"
      CREATE_PR="{{create_fix_pr}}"
      
      mkdir -p "$FIXES_DIR"
      
      # Check if there's an existing PR (skip if so)
      cat << 'EXISTING_PR_JSON' > /tmp/existing_pr_$$.json
      {{existing_pr_check}}
      EXISTING_PR_JSON
      
      EXISTING_PR=$(jq -r '.existing_pr // false' /tmp/existing_pr_$$.json 2>/dev/null || echo "false")
      rm -f /tmp/existing_pr_$$.json
      
      if [ "$EXISTING_PR" = "true" ] && [ "$DRY_RUN" != "true" ]; then
        echo "Skipping fix preparation - existing PR found"
        echo "Run with dry_run=true to see what would be fixed"
        exit 0
      fi
      
      # Copy non-matching boilerplate files to fixes dir
      BOILERPLATE='{{boilerplate_check}}'
      FILES_TO_FIX=""
      for file in CODE_OF_CONDUCT.md SECURITY.md SUPPORT.md LICENSE; do
        STATUS=$(echo "$BOILERPLATE" | jq -r --arg f "$file" '.files[] | select(.name == $f) | .severity')
        if [ "$STATUS" = "error" ]; then
          cp "$REF_DIR/$file" "$FIXES_DIR/$file"
          FILES_TO_FIX="$FILES_TO_FIX $file"
          echo "Prepared fix: $file"
        fi
      done
      
      # Check if README was fixed (file would already be in fixes dir from write-fixed-readme step)
      README_FIXED="false"
      if [ -f "$FIXES_DIR/README.md" ]; then
        README_FIXED="true"
        FILES_TO_FIX="$FILES_TO_FIX README.md"
        echo "Prepared fix: README.md (Contributing/Trademarks sections)"
      fi
      
      # Create PR instructions/preview
      if [ "$DRY_RUN" = "true" ]; then
        echo ""
        echo "========================================"
        echo "DRY-RUN: PR PREVIEW for $REPO"
        echo "========================================"
        echo ""
        
        if [ "$EXISTING_PR" = "true" ]; then
          echo "NOTE: An existing PR was found. If not in dry-run mode,"
          echo "      PR creation would be skipped to avoid duplicates."
          echo ""
        fi
        
        if [ -z "$FILES_TO_FIX" ]; then
          echo "✓ No fixes needed - all checks passed"
        else
          echo "Files that WOULD be fixed:"
          for f in $FILES_TO_FIX; do
            echo "  - $f"
          done
          echo ""
          echo "PR that WOULD be created:"
          echo "  Title: fix: Update Microsoft OSS compliance files"
          echo "  Branch: fix/compliance-boilerplate-update"
          echo "  Body: Updates compliance files to match Microsoft OSS standards"
          echo ""
          if [ "$README_FIXED" = "true" ]; then
            echo "README.md changes:"
            echo "  - Contributing section: updated to standard template"
            echo "  - Trademarks section: updated to standard template"
            echo ""
          fi
          echo "Fix files prepared at: $FIXES_DIR"
        fi
        echo ""
        echo "[DRY-RUN MODE - No PR was created]"
        echo "========================================"
      fi
      
      # Create PR instructions file
      cat << 'PR_INSTRUCTIONS' > "$TARGET_DIR/pr-instructions.md"
      # Fix PR Instructions for {{repo_owner}}/{{repo_name}}
      
      ## Files to Update
      
      Copy these files from the `fixes/` directory:
      - Boilerplate: CODE_OF_CONDUCT.md, SECURITY.md, SUPPORT.md, LICENSE (if present)
      - README.md (if present - includes updated Contributing & Trademarks sections)
      
      ## Steps to Create Fix PR
      
      1. Clone the repository:
         ```bash
         git clone https://github.com/{{repo_owner}}/{{repo_name}}.git
         cd {{repo_name}}
         ```
      
      2. Create a branch:
         ```bash
         git checkout -b fix/compliance-boilerplate-update
         ```
      
      3. Copy fixed files:
         ```bash
         cp {{working_dir}}/{{repo_name}}/fixes/* .
         ```
      
      4. Review changes (especially README.md):
         ```bash
         git diff
         ```
      
      5. Commit and push:
         ```bash
         git add .
         git commit -m "fix: Update Microsoft OSS compliance files"
         git push origin fix/compliance-boilerplate-update
         ```
      
      6. Create PR:
         ```bash
         gh pr create \
           --title "fix: Update Microsoft OSS compliance files" \
           --body "Updates compliance files to match Microsoft OSS standards.
      
      Generated by Amplifier repo-audit recipe."
         ```
      PR_INSTRUCTIONS
      
      echo ""
      echo "Fix instructions written to: $TARGET_DIR/pr-instructions.md"
      echo ""
      echo "Files prepared for PR:"
      ls -la "$FIXES_DIR" 2>/dev/null || echo "No fix files generated (all checks may have passed)"
    output: "pr_creation_result"
    timeout: 120
    on_error: "continue"

  # ==========================================================================
  # STEP 12: Final Summary
  # ==========================================================================
  - id: "final-summary"
    type: "bash"
    command: |
      REPORT_PATH="{{working_dir}}/{{repo_name}}/audit-report.md"
      
      echo "========================================"
      echo "AUDIT COMPLETE: {{repo_owner}}/{{repo_name}}"
      echo "========================================"
      echo ""
      echo "Report: $REPORT_PATH"
      echo ""
      
      if [ -f "$REPORT_PATH" ]; then
        cat "$REPORT_PATH"
      else
        echo "ERROR: Report file not found"
        exit 1
      fi
    output: "final_output"
    timeout: 30
    on_error: "continue"
